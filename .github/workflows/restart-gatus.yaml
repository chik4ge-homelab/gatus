name: Restart Gatus

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: restart-gatus
  cancel-in-progress: true

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Restart service
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -eu

          deploy_ip="$(
            tailscale status --json |
              jq -r --arg host "${DEPLOY_HOST%.}." '.Peer[] | select(.DNSName == $host) | .TailscaleIPs[0]'
          )"

          tailscale ssh "$DEPLOY_USER@$deploy_ip" \
            'cd ~/gatus && git pull --ff-only && docker compose restart gatus'
