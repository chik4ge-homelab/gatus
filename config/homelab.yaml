alerting:
  discord:
    webhook-url: ${DISCORD_WEBHOOK_URL}
    default-alert:
      description: "(${SERVICE_NAME}) Please check ${SERVICE_URL} for more details."
      send-on-resolved: true
      failure-threshold: 5
      success-threshold: 2

endpoints:
  - name: Grafana
    group: Homelab Kubernetes
    url: https://grafana.chik4ge.me/api/health
    conditions:
      - "[STATUS] == 200"
      - "[BODY].database == ok"
    alerts:
      - type: discord

  - name: Argo CD
    group: Homelab Kubernetes
    url: https://argocd.chik4ge.me/healthz
    conditions:
      - "[STATUS] == 200"
      - "[BODY] == ok"
    alerts:
      - type: discord

  - name: Proxmox VE
    group: Homelab Infrastructure
    url: https://pve.chik4ge.me/api2/json/nodes
    headers:
      Authorization: PVEAPIToken=${PVE_API_TOKEN}
      CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}
      CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}
    conditions:
      - "[STATUS] == 200"
      - "len([BODY].data) == 4"
      - "[BODY].data[0].status == online"
      - "[BODY].data[1].status == online"
      - "[BODY].data[2].status == online"
      - "[BODY].data[3].status == online"
    alerts:
      - type: discord

  - name: Alloy
    group: Homelab Kubernetes
    url: https://alloy.chik4ge.me/-/healthy
    conditions:
      - "[STATUS] == 200"
      - "[BODY] == All Alloy components are healthy."
    alerts:
      - type: discord

  - name: Mimir
    group: Homelab Kubernetes
    url: https://mimir.chik4ge.me/ready
    conditions:
      - "[STATUS] == 200"
      - "[BODY] == OK"
    alerts:
      - type: discord

  - name: Immich
    group: Homelab Applications
    url: https://immich.chik4ge.me
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord

  - name: Home Assistant
    group: Homelab Applications
    url: https://home.chik4ge.me
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord

  - name: UniFi
    group: Homelab Applications
    url: https://unifi.chik4ge.me
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord

  - name: 1Password Connect
    group: Homelab Applications
    url: https://connect.chik4ge.me/health
    conditions:
      - "[STATUS] == 200"
      - "[BODY].dependencies[0].status == ACTIVE"
      - "[BODY].dependencies[1].status == AVAILABLE"
      - "[BODY].dependencies[2].status == ACTIVE"
      - "[BODY].dependencies[3].status == ACTIVE"
    alerts:
      - type: discord

  - name: Ceph Dashboard
    group: Homelab Infrastructure
    url: https://ceph.chik4ge.me
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord

  - name: Ceph Object Gateway
    group: Homelab Infrastructure
    url: https://rgw.chik4ge.me
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord
